---
name: Build and release ISO

on:
  schedule:
    - cron: '0 14 1 * *'  # 14:00 UTC on the 1st of every month (after daily container build)
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"
  BIB_IMAGE: "quay.io/centos-bootc/bootc-image-builder:latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-iso:
    name: Build and release ISO
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      packages: read
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          USER_UID=$(id -u)
          USER_GID=$(id -g)
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}
          echo "USER_UID=${USER_UID}" >> ${GITHUB_ENV}
          echo "USER_GID=${USER_GID}" >> ${GITHUB_ENV}
          echo "RELEASE_TAG=iso-$(date -u +%Y%m%d)" >> ${GITHUB_ENV}
          echo "RELEASE_DATE=$(date -u +%Y-%m-%d)" >> ${GITHUB_ENV}

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build ISO
        id: build
        uses: osbuild/bootc-image-builder-action@main
        with:
          builder-image: ${{ env.BIB_IMAGE }}
          config-file: ./disk_config/iso.toml
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          chown: ${{ env.USER_UID }}:${{ env.USER_GID }}
          types: anaconda-iso
          additional-args: --use-librepo=True --rootfs xfs

      - name: Prepare ISO for release
        run: |
          ISO_FILE=$(find "${{ steps.build.outputs.output-directory }}" -name "*.iso" | head -1)
          ISO_NAME="kaamos-${{ env.RELEASE_DATE }}.iso"
          cp "$ISO_FILE" "$ISO_NAME"
          echo "ISO_NAME=${ISO_NAME}" >> ${GITHUB_ENV}
          sha256sum "$ISO_NAME" > "${ISO_NAME}.sha256"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" \
            --title "Kaamos ISO ${{ env.RELEASE_DATE }}" \
            --notes "## Kaamos ISO — ${{ env.RELEASE_DATE }}

Monthly Kaamos ISO build. Use the Anaconda installer to perform a fresh install.

### Install
Boot from this ISO and follow the Anaconda installer. The system will automatically switch to \`ghcr.io/thephatleee/kaamos:latest\` on first boot.

### Verify checksum
\`\`\`bash
sha256sum -c ${{ env.ISO_NAME }}.sha256
\`\`\`" \
            "${{ env.ISO_NAME }}" \
            "${{ env.ISO_NAME }}.sha256"

      - name: Delete releases older than 30 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CUTOFF=$(date -d '30 days ago' -u +%Y%m%d)
          gh release list --limit 1000 --json tagName \
            | jq -r '.[].tagName' \
            | grep '^iso-' \
            | while read tag; do
                DATE=$(echo "$tag" | sed 's/^iso-//')
                if [[ "$DATE" =~ ^[0-9]{8}$ ]] && [ "$DATE" -lt "$CUTOFF" ]; then
                  echo "Deleting release $tag (older than 30 days)"
                  gh release delete "$tag" --yes --cleanup-tag
                fi
              done
